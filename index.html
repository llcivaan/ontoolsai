<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnToolsAI — You stay on the tools. We'll run the words.</title>
  <meta name="description" content="AI-powered message writing for trade businesses. Quotes, reviews, invoices, hiring — sorted in seconds." />
  <meta name="theme-color" content="#E8960A" />
  <meta property="og:title" content="OnToolsAI — Messages for trade businesses, sorted." />
  <meta property="og:description" content="Write professional customer messages in seconds. Built for cleaners, HVAC, plumbers, roofers, landscapers and electricians." />
  <meta property="og:url" content="https://ontoolsai.com" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23E8960A'/><text y='.9em' font-size='70' x='15'>⚡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { min-height: 100%; }
    body { background: #0D0D0D; font-family: 'DM Sans', 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
    #loader {
      position: fixed; inset: 0; background: #0D0D0D;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      z-index: 9999; transition: opacity 0.4s;
    }
    #loader .logo {
      width: 52px; height: 52px; background: #E8960A; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 26px;
      animation: lp 1.4s infinite;
    }
    #loader p { color: #555; font-size: 13px; font-family: 'DM Sans', sans-serif; }
    @keyframes lp { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }
  </style>
</head>
<body>
  <div id="loader"><div class="logo">⚡</div><p>Loading OnToolsAI...</p></div>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
